top_text = "";
bottom_text = "";
border_width = 0;
columns = 6;

size = {
    width = 500;
    height = 200;
};

shutdown: {
    title = ""
    label = "";
    description = "⏻ Shutdown";
    action = "shutdown now";
    bind = 115;     // 's'
};

reboot: {
    title = ""
    label = "";
    description = "   Reboot";
    action = "reboot";
    bind = 114;     // 'r'
};

logout: {
    title = ""
    label = "";
    description = "󰿅   Logout";
    action = "hyprctl dispatch 'hl.dsp.exit()'";
    bind = 108;     // 'l'
};

suspend: {
    title = ""
    label = "";
    description = "󰤄  Sleep";
    action = "systemctl suspend";
    bind = 117;     // 'u'
};  

lock: {
    title = ""
    label = "";
    description = "  Lock";
    action = "hyprlock";
    bind = 107;     // 'k'
};
